# Valores iniciales de Hefesto. Ajustalos tras observar una semana de economia real.
language: es_CL
economy:
  enabled: true
  weekly-upkeep:
    enabled: true
    grace-hours: 24
    check-minutes: 5
    default-cost: 1500.0
    costs:
      hephaestus: 1500.0
  treasury:
    enabled: true
    treasury-share-percent: 20
renunciation:
  cooldown-hours: 48
  confirmation-required: true
pvp:
  survival-powers-enabled: false
  divine-arena:
    enabled: false
    region-id: pvpdivino
    progression-source: arena-only
integrations:
  auraskills: passive-statistics-only
  protections:
    respect-worldguard: true
    respect-protectionstones: true
  slimefun:
    enabled: true
    configured-items-only: true
    pulso-de-red:
      radius: 6
      max-machines: 3
      # Se aplica seis veces por activacion: 24.576 J por maquina y hasta
      # 73.728 J si Hefesto encuentra los tres consumidores permitidos.
      energy-per-machine-per-pulse: 4096
      interval-seconds: 5
      allowed-item-ids:
        # LiteXpansion: consumidores industriales reales de 16.666 y 50.000 J/s.
        - MASS_FABRICATOR_MACHINE
        - UU_CRAFTER
hephaestus:
  ojo-de-mena:
    radius: 8
    max-markers: 24
