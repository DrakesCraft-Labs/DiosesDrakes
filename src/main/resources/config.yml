# Economia y efectos divinos. Los costes altos se concentran en la ascension para mover capital sin castigar al jugador nuevo.
language: es_CL
economy:
  enabled: true
  weekly-upkeep:
    enabled: true
    grace-hours: 24
    check-minutes: 5
    # Se suma al 2.5% de lo invertido en habilidades del patron. Un arbol completo
    # requiere una ofrenda semanal relevante, mientras las ramas tempranas siguen accesibles.
    default-cost: 5000.0
    invested-percent: 2.5
    max-cost: 2500000.0
    costs:
      hephaestus: 5000.0
  treasury:
    enabled: true
    treasury-share-percent: 20
renunciation:
  cooldown-hours: 48
  confirmation-required: true
pvp:
  survival-powers-enabled: false
  divine-arena:
    enabled: false
    region-id: pvpdivino
    progression-source: arena-only
integrations:
  odysseia:
    boss-rewards:
      enabled: true
      base-favor: 60
      minimum-favor: 15
      maximum-favor: 300
      multipliers:
        thor: 1.4
        odin: 1.6
        zeus: 1.6
        kratos: 1.8
        tifon: 2.0
  auraskills: passive-statistics-only
  protections:
    respect-worldguard: true
    respect-protectionstones: true
  slimefun:
    enabled: true
    configured-items-only: true
    pulso-de-red:
      radius: 6
      max-machines: 3
      # Se aplica seis veces por activacion: 24.576 J por maquina y hasta
      # 73.728 J si Hefesto encuentra los tres consumidores permitidos.
      energy-per-machine-per-pulse: 4096
      interval-seconds: 5
      allowed-item-ids:
        # LiteXpansion: consumidores industriales reales de 16.666 y 50.000 J/s.
        - MASS_FABRICATOR_MACHINE
        - UU_CRAFTER
hephaestus:
  ojo-de-mena:
    radius: 8
    max-markers: 24
visuals:
  # Display Entities nativas de Paper: no resource pack, no mod y siempre con limpieza programada.
  display-entities:
    enabled: true
    # Floodgate/Bedrock conserva particulas y sonidos; activa esto solo despues de validar displays en movil.
    bedrock-enabled: false
    max-displays-per-scene: 8
    view-range: 32
