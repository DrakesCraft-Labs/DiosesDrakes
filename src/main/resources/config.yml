# Valores iniciales de Hefesto. Ajustalos tras observar una semana de economia real.
language: es_CL
economy:
  enabled: true
  weekly-upkeep:
    enabled: true
    grace-hours: 24
    check-minutes: 5
    costs:
      hephaestus: 1500.0
  treasury:
    enabled: true
    treasury-share-percent: 20
renunciation:
  cooldown-hours: 48
  confirmation-required: true
pvp:
  survival-powers-enabled: false
  divine-arena:
    enabled: false
    region-id: pvpdivino
    progression-source: arena-only
integrations:
  auraskills: passive-statistics-only
  protections:
    respect-worldguard: true
    respect-protectionstones: true
  slimefun:
    enabled: true
    configured-items-only: true
    pulso-de-red:
      radius: 6
      max-machines: 3
      energy-per-machine-per-pulse: 12
      interval-seconds: 5
      allowed-item-ids:
        - ELECTRIC_INGOT_FACTORY
        - ELECTRIC_ORE_GRINDER
        - ELECTRIC_DUST_WASHER
        - ELECTRIC_GOLD_PAN
hephaestus:
  ojo-de-mena:
    radius: 8
    max-markers: 24
