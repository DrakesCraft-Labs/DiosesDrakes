name: DiosesDrakes
version: '${project.version}'
main: cl.drakescraft.diosesdrakes.DiosesDrakes
api-version: '1.21'
folia-supported: true
author: JackStar
description: Progresion divina, economia y sistemas mitologicos para DrakesCraft.
softdepend:
  - AuraSkills
  - Odysseia
  - PlaceholderAPI
  - ProtectionStones
  - Slimefun
  - Vault
  - WorldGuard
  - sBank
commands:
  dioses:
    description: Abre el panteon de DiosesDrakes.
    usage: /dioses
    aliases: [dios, panteon]
permissions:
  diosesdrakes.use:
    description: Permite abrir el panteon.
    default: true
  diosesdrakes.admin:
    description: Permite administrar DiosesDrakes.
    default: op
